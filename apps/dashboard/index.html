<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>Better Update</title>
    <meta
      name="description"
      content="Deploy, monitor, and roll back over-the-air updates for your React Native apps with Better Update."
    />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Better Update" />
    <meta property="og:title" content="Better Update — Dashboard" />
    <meta
      property="og:description"
      content="Deploy, monitor, and roll back over-the-air updates for your React Native apps."
    />
    <meta property="og:url" content="https://console.better-update.dev" />
    <meta property="og:image" content="https://console.better-update.dev/og-image.svg" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Better Update — React Native OTA command center" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Better Update — Dashboard" />
    <meta
      name="twitter:description"
      content="Deploy, monitor, and roll back over-the-air updates for your React Native apps."
    />
    <meta name="twitter:image" content="https://console.better-update.dev/og-image.svg" />

    <script>
      (function () {
        var c = document.cookie.match(/(?:^|;\s*)theme=([\w]+)/);
        var t = c && c[1];
        var d = document.documentElement;
        if (
          t === "dark" ||
          ((!t || t === "system") && matchMedia("(prefers-color-scheme:dark)").matches)
        ) {
          d.classList.add("dark");
        } else {
          d.classList.remove("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
