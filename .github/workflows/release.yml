name: Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run only (no tag push)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Generate Cloudflare types
        run: bun run typegen:cf

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build
        run: bun run build

      - name: Lerna version (dry-run)
        if: ${{ inputs.dry-run }}
        run: bun run release:preview
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}

      - name: Lerna version
        if: ${{ !inputs.dry-run }}
        run: bun run release:version
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}

      - name: Push commit and tags individually
        if: ${{ !inputs.dry-run }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          git push origin HEAD
          for tag in $(git tag --points-at HEAD); do
            echo "Pushing $tag"
            git push origin "refs/tags/$tag"
            sleep 2
            echo "Creating release $tag"
            gh release create "$tag" --verify-tag --title "$tag" --generate-notes
          done
